name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      # DB-DRIVER LOCK: this template's database driver is better-sqlite3, by design.
      # The build agent must not swap it (e.g. to libsql) — not in deps, not via a
      # vitest alias. A swap that passes other gates is still a contract violation.
      - name: Database driver lock (better-sqlite3 only)
        run: |
          set -e
          # 1. No libsql in package.json dependencies.
          if grep -qiE '"@?libsql' package.json; then
            echo "::error::DB-driver lock: libsql found in package.json. This template uses better-sqlite3 only."
            exit 1
          fi
          # 2. No libsql imported anywhere in source.
          if grep -rniE "from ['\"]@?libsql|require\(['\"]@?libsql" \
                --include="*.ts" --include="*.tsx" \
                . 2>/dev/null | grep -v node_modules; then
            echo "::error::DB-driver lock: libsql imported in source. This template uses better-sqlite3 only."
            exit 1
          fi
          # 3. No vitest alias redirecting better-sqlite3 to another driver.
          if grep -rniE "better-sqlite3.*:.*libsql|alias.*better-sqlite3" \
                vitest.config.ts vitest.*.config.ts 2>/dev/null; then
            echo "::error::DB-driver lock: vitest aliases better-sqlite3 to another driver. Not permitted."
            exit 1
          fi
          echo "DB-driver lock OK: better-sqlite3 is the sole database driver."

      # Fail fast: lint runs first, blocks type-check and tests if it fails.
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      # Global threshold: 80% lines. Enforced here for all source files.
      - name: Unit tests (coverage ≥80%)
        run: npm run test:coverage

      # Per-path 100% gate: compliance and auth code must be fully tested.
      # Passes trivially until those directories contain source files.
      - name: Coverage gate — compliance and auth (100%)
        run: |
          FILES=$(find . \( -path "*/compliance/*.ts" -o -path "*/compliance/*.tsx" \
                          -o -path "*/auth/*.ts" -o -path "*/auth/*.tsx" \) \
                      ! -path "*/node_modules/*" ! -name "*.test.*" ! -name "*.spec.*" 2>/dev/null)
          if [ -n "$FILES" ]; then
            npx vitest run --coverage \
              --coverage.include="**/compliance/**" \
              --coverage.include="**/auth/**" \
              --coverage.thresholds.lines=100
          else
            echo "No compliance/auth source files found — 100% gate passes (no files to check)"
          fi

      - name: Playwright smoke test
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      # Fail on high-severity vulnerabilities in production dependencies.
      - name: Security audit
        run: npm audit --audit-level high --omit=dev
