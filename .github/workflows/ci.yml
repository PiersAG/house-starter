name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
      # DB-DRIVER LOCK: this template's database driver is libSQL (@libsql/client +
      # drizzle-orm/libsql), by design — same driver across dev/test/staging/prod,
      # differing only by DATABASE_URL, and deployable to serverless. The build
      # agent must not swap it back to better-sqlite3 (file-on-local-disk; cannot
      # run on serverless). A swap that passes other gates is still a contract
      # violation.
      - name: Database driver lock (libSQL only)
        run: |
          set -e
          # 1. @libsql/client MUST be a declared dependency.
          if ! grep -qE '"@libsql/client"' package.json; then
            echo "::error::DB-driver lock: @libsql/client missing from package.json. This template uses libSQL for dev/prod parity and serverless deployability."
            exit 1
          fi
          # 2. better-sqlite3 MUST NOT reappear (file-on-local-disk; cannot run on serverless).
          if grep -qiE '"better-sqlite3"|"@types/better-sqlite3"' package.json; then
            echo "::error::DB-driver lock: better-sqlite3 found in package.json. It cannot run on serverless (no persistent local disk). Use libSQL."
            exit 1
          fi
          # 3. No better-sqlite3 imported anywhere in source.
          if grep -rniE "from ['\"]better-sqlite3|require\(['\"]better-sqlite3|drizzle-orm/better-sqlite3" \
                --include="*.ts" --include="*.tsx" \
                . 2>/dev/null | grep -v node_modules; then
            echo "::error::DB-driver lock: better-sqlite3 imported in source. Use libSQL (@libsql/client + drizzle-orm/libsql)."
            exit 1
          fi
          echo "DB-driver lock OK: libSQL is the sole database driver."

      # Fail fast: lint runs first, blocks type-check and tests if it fails.
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      # Coverage truth (spec C4b): NO blanket global threshold — the report is
      # informational and honest. The SECURITY GATE is per-file 100% coverage
      # on lib/password.ts, lib/rate-limit.ts, lib/users.ts and lib/db.ts,
      # declared in vitest.config.ts and enforced right here, where coverage
      # is actually computed. This step FAILS if any of those files loses
      # coverage.
      - name: Unit tests + per-file 100% security coverage gate
        run: npm run test:coverage

      # Tamper check for the gate above. Enforcement lives in the coverage run
      # (single source of truth — deliberately no duplicate coverage logic
      # here); this step pins the contract so the per-file 100% thresholds
      # cannot be silently deleted, renamed, or lowered. It names REAL FILES
      # BY PATH — no directory-name pattern matching.
      - name: Security gate contract check (per-file 100% thresholds present)
        run: |
          node -e '
            const { readFileSync, existsSync } = require("fs");
            const cfg = readFileSync("vitest.config.ts", "utf8");
            const files = ["lib/password.ts", "lib/rate-limit.ts", "lib/users.ts", "lib/db.ts"];
            const metrics = ["lines", "statements", "branches", "functions"];
            let failed = false;
            for (const f of files) {
              if (!existsSync(f)) {
                console.error(`::error::Security gate contract: ${f} is missing from the repo.`);
                failed = true;
                continue;
              }
              const start = cfg.indexOf(`"**/${f}": {`);
              if (start === -1) {
                console.error(`::error::Security gate contract: vitest.config.ts no longer declares a per-file threshold block for ${f}.`);
                failed = true;
                continue;
              }
              const block = cfg.slice(start, cfg.indexOf("}", start) + 1);
              const missing = metrics.filter((m) => !block.includes(`${m}: 100`));
              if (missing.length > 0) {
                console.error(`::error::Security gate contract: ${f} thresholds not pinned at 100 for: ${missing.join(", ")}.`);
                failed = true;
              } else {
                console.log(`${f}: per-file 100% thresholds declared`);
              }
            }
            process.exit(failed ? 1 : 0);
          '

      # Billing grace-window acceptance (billing-gap-fill-spec §3 item 4): a REAL
      # Stripe test clock advanced past the failed-payment grace boundary. The
      # suite self-skips unless STRIPE_TEST_SECRET_KEY holds a real test-mode key
      # (the CI dummy is rejected), so this step is green with or without the
      # secret — and actually exercises the clock once the secret is provided.
      - name: Billing grace test-clock (real Stripe test key only; auto-skips without one)
        run: npm run test:integration
        env:
          STRIPE_TEST_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}

      # E2E env (spec C4b, Deliverable D). CI-ONLY THROWAWAY VALUES — none of
      # these are real secrets and none reach any real system. The app fails
      # loudly at startup without a session secret and a database URL (by
      # design, no insecure defaults), so CI must provide explicit values for
      # the full chain to run. instrumentation.ts additionally validates the
      # running env against .env.contract at boot, so CI must supply every
      # deploy-injected contract var (DATABASE_AUTH_TOKEN is not required here
      # because DATABASE_URL is a local file: URL — the boot validator only
      # requires a token for a remote database).
      - name: Playwright smoke test
        env:
          # Dummy JWT-signing secret for this CI browser session only.
          AUTH_SECRET: ci-e2e-only-dummy-secret-not-used-anywhere-real
          # Local SQLite file (the scaffold's dev fallback), created on the
          # runner and discarded with it. Shared tenancy mode matches how the
          # template app wires lib/auth.ts to the shared db export.
          TENANCY_MODE: shared
          DATABASE_URL: file:ci-e2e.db
          # Explicit safe-environment flag (ADR-015): in-memory rate limiting
          # is acceptable only here, where nothing real is reachable.
          RATE_LIMIT_ALLOW_IN_MEMORY: "true"
          # Declared deploy-injected in .env.contract → the boot validator
          # requires them. Throwaway/non-gating values for CI only:
          #   • STRIPE_SECRET_KEY: unused by the template today; a dummy string.
          #   • APP_LIFECYCLE_STATE: LIVE_EVAL matches the current effective
          #     default (an unset value already resolves to LIVE_EVAL) so E2E
          #     behaviour is unchanged; the smoke suite hits only public routes.
          STRIPE_SECRET_KEY: sk_test_ci-e2e-only-dummy-not-a-real-key
          # STRIPE_WEBHOOK_SECRET: declared deploy-injected in .env.contract →
          # the boot validator requires it. Unused by the smoke suite (no real
          # webhook is delivered); a dummy string satisfies the presence check.
          STRIPE_WEBHOOK_SECRET: whsec_ci-e2e-only-dummy-not-a-real-secret
          APP_LIFECYCLE_STATE: LIVE_EVAL
          # EMAIL_PROVIDER_API_KEY (secret) + EMAIL_SEND_MODE (fixed) are
          # declared deploy-injected in .env.contract → the boot validator
          # requires them. EMAIL_SEND_MODE=log means no real mail is ever sent
          # in CI; the key is a dummy the log path never uses. (EMAIL_FROM is
          # source=app, not deploy-injected, so the boot validator skips it.)
          EMAIL_PROVIDER_API_KEY: re_ci-e2e-only-dummy-not-a-real-key
          EMAIL_SEND_MODE: log
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      # Fail on high-severity vulnerabilities in production dependencies.
      - name: Security audit
        run: npm audit --audit-level high --omit=dev

      # Anti-slopsquatting: for every dependency outside the pinned
      # house-starter baseline (scripts/deps-baseline.json), verify it exists
      # on the npm registry, the resolved version is >= 14 days old, and the
      # package is established (>= 90 days old or >= 1000 weekly downloads).
      # Also asserts the lockfile is in sync. Deterministic — no LLM, no
      # writes. Spec: wiki/specs/stage0-deps-and-budget.md.
      - name: Dependency existence check (anti-slopsquatting)
        run: python3 scripts/check-deps-existence.py --workspace .

  # Both-states matrix (capability-model-spec R3): prove every capability flag is
  # a REAL switch by running the suite with it flipped OFF as well as ON, not
  # just at the default posture. Each leg is a fresh (throwaway) checkout;
  # scripts/set-flag.mjs rewrites config/capabilities.ts before the suite runs —
  # the sanctioned flip mechanism (never a runtime env var; see config/kernel.ts).
  #
  # SCOPE (explicit, not silent): each leg runs type-check + the unit suite,
  # which is where flag-driven behaviour (settings visibility, and — as
  # capabilities gain routes/nav in steps 1, 3–9 — their 404-when-off and
  # nav-absent proofs in tests/unit/capability-both-states.test.ts) is asserted.
  # The full e2e/Playwright + coverage + security gates run once, at the default
  # posture, in the `ci` job above; they are not re-run per leg to bound CI cost.
  # This job is the pattern later per-feature retrofits extend by adding routes
  # to CAPABILITY_ROUTES / CAPABILITY_NAV.
  capability-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flag: [payments, booking, comms]
        # Quoted: YAML 1.1 reads bare on/off as booleans, which would pass
        # "true"/"false" to set-flag.mjs (it wants on|off).
        state: ["on", "off"]
    name: capability ${{ matrix.flag }} = ${{ matrix.state }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Flip capability flag (throwaway checkout)
        run: node scripts/set-flag.mjs --flag ${{ matrix.flag }} --state ${{ matrix.state }}

      - name: Show resulting capability posture
        run: |
          echo "config/capabilities.ts posture for this leg:"
          grep -E "payments:|booking:|comms:" config/capabilities.ts

      - name: Type check (flag ${{ matrix.state }})
        run: npm run type-check

      - name: Unit suite (flag ${{ matrix.flag }} = ${{ matrix.state }})
        run: npm run test
